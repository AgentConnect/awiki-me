name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  PUB_HOSTED_URL: https://mirrors.tuna.tsinghua.edu.cn/dart-pub
  FLUTTER_STORAGE_BASE_URL: https://mirrors.tuna.tsinghua.edu.cn/flutter

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AWiki Me
        uses: actions/checkout@v4
        with:
          path: test-awiki-me

      - name: Checkout AWiki CLI / IM Core
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/awiki-cli-rs2
          ref: ${{ vars.AWIKI_CLI_RS2_REF || 'feature/release-0526/agent-im-hutong' }}
          token: ${{ secrets.AWIKI_CI_READ_TOKEN || github.token }}
          path: awiki-cli-rs2

      - name: Setup Flutter
        uses: subosito/flutter-action@v3
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libsecret-1-dev libsqlite3-dev xvfb dbus-x11

      - name: Enable Flutter Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Prepare SQLite source for Linux desktop build
        run: |
          for attempt in 1 2 3 4 5 6; do
            curl --fail --location --continue-at - \
              --connect-timeout 20 \
              --max-time 120 \
              --output /tmp/sqlite-autoconf-3520000.tar.gz \
              https://sqlite.org/2026/sqlite-autoconf-3520000.tar.gz && break
            if [ "$attempt" = "6" ]; then
              exit 1
            fi
            sleep 5
          done
          mkdir -p /tmp/awiki-sqlite3
          tar -xzf /tmp/sqlite-autoconf-3520000.tar.gz \
            --strip-components=1 \
            -C /tmp/awiki-sqlite3

      - name: Build Linux native IM Core
        working-directory: awiki-cli-rs2
        run: scripts/flutter/build-sdk-native.sh --linux-only

      - name: Install Flutter dependencies
        working-directory: test-awiki-me
        run: flutter pub get

      - name: Dart analyze
        working-directory: test-awiki-me
        run: dart analyze

      - name: Flutter test
        working-directory: test-awiki-me
        run: dart run tests/unit/runner.dart

      - name: Desktop E2E smoke dry-run
        working-directory: test-awiki-me
        run: dart run tests/e2e/runner.dart --case smoke --platform linux --dry-run

      - name: Desktop E2E smoke
        working-directory: test-awiki-me
        env:
          AWIKI_SQLITE3_SOURCE_DIR: /tmp/awiki-sqlite3
        run: dart run tests/e2e/runner.dart --case smoke --platform linux

      - name: Desktop App + CLI peer E2E dry-run
        working-directory: test-awiki-me
        run: dart run tests/e2e/runner.dart --case full --platform linux --dry-run --cli-bin /tmp/fake-awiki-cli
