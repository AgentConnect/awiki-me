name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "40 18 * * *"
  workflow_dispatch:
    inputs:
      cli_ref:
        description: Exact 40-character awiki-cli-rs2 commit SHA
        required: true
        type: string
      e2e_case:
        description: Audited remote product suite
        required: true
        default: full
        type: choice
        options: [full, direct, group, attachment, contacts]

permissions:
  contents: read

concurrency:
  group: awiki-me-${{ github.workflow }}-${{ github.event_name == 'schedule' && 'nightly' || github.ref }}
  cancel-in-progress: false

env:
  PUB_HOSTED_URL: https://pub.dev
  FLUTTER_STORAGE_BASE_URL: https://storage.googleapis.com

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Require exact CLI / SDK source ref
        env:
          CLI_REF: ${{ github.event.inputs.cli_ref || vars.AWIKI_CLI_RS2_REF }}
        run: |
          [[ "$CLI_REF" =~ ^[0-9a-fA-F]{40}$ ]] || {
            echo "AWIKI_CLI_RS2_REF (or workflow input) must be an exact commit SHA" >&2
            exit 1
          }

      - name: Checkout AWiki Me
        uses: actions/checkout@v6
        with:
          path: test-awiki-me

      - name: Checkout AWiki CLI / IM Core
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/awiki-cli-rs2
          ref: ${{ github.event.inputs.cli_ref || vars.AWIKI_CLI_RS2_REF }}
          token: ${{ secrets.AWIKI_CI_READ_TOKEN || github.token }}
          path: awiki-cli-rs2

      - name: Record exact CLI / SDK source ref
        run: git -C awiki-cli-rs2 rev-parse HEAD | tee /tmp/awiki-cli-ref

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Install Linux desktop dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libsecret-1-dev libsqlite3-dev xvfb dbus-x11

      - name: Enable Flutter Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Prepare SQLite source for Linux desktop build
        run: |
          for attempt in 1 2 3 4 5 6; do
            curl --fail --location --continue-at - \
              --connect-timeout 20 --max-time 120 \
              --output /tmp/sqlite-autoconf-3520000.tar.gz \
              https://sqlite.org/2026/sqlite-autoconf-3520000.tar.gz && break
            if [ "$attempt" = "6" ]; then exit 1; fi
            sleep 5
          done
          mkdir -p /tmp/awiki-sqlite3
          tar -xzf /tmp/sqlite-autoconf-3520000.tar.gz \
            --strip-components=1 -C /tmp/awiki-sqlite3

      - name: Build debug native IM Core and CLI
        working-directory: awiki-cli-rs2
        run: |
          cargo build -p im-core-dart -p awiki-cli --locked
          mkdir -p packages/awiki_im_core/linux/lib
          cp target/debug/libawiki_im_core.so \
            packages/awiki_im_core/linux/lib/libawiki_im_core.so

      - name: Install Flutter dependencies
        working-directory: test-awiki-me
        run: flutter pub get

      - name: Dart analyze
        working-directory: test-awiki-me
        run: dart analyze

      - name: Flutter unit/widget/provider gate
        working-directory: test-awiki-me
        run: |
          dart run tests/unit/runner.dart --branch-coverage
          dart run tool/test_coverage_gate.dart

      - name: Validate case catalog and generated documentation
        working-directory: test-awiki-me
        run: dart run tool/validate_test_catalog.dart

      - name: Real desktop smoke (no service dependency)
        working-directory: test-awiki-me
        env:
          AWIKI_SQLITE3_SOURCE_DIR: /tmp/awiki-sqlite3
        run: dart run tests/e2e/runner.dart --case smoke --run-id gha-smoke-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Product manifest orchestration lint only
        working-directory: test-awiki-me
        run: |
          cp tests/e2e/configs/e2e.example.yaml /tmp/awiki-e2e-dry-run.yaml
          sed -i 's/platform: macos/platform: linux/' /tmp/awiki-e2e-dry-run.yaml
          sed -i "s/0000000000000000000000000000000000000000/$(cat /tmp/awiki-cli-ref)/" /tmp/awiki-e2e-dry-run.yaml
          dart run tests/e2e/runner.dart --case full --dry-run \
            --config /tmp/awiki-e2e-dry-run.yaml \
            --run-id gha-dry-run-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload deterministic reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: awiki-me-deterministic-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-awiki-me/.e2e/
          if-no-files-found: error
          retention-days: 14

  remote-product:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - name: Require exact ref and remote account pool secrets
        env:
          CLI_REF: ${{ github.event.inputs.cli_ref || vars.AWIKI_CLI_RS2_REF }}
          E2E_PHONE: ${{ secrets.AWIKI_E2E_OTP_PHONE }}
          E2E_OTP: ${{ secrets.AWIKI_E2E_OTP_CODE }}
          APP_HANDLE: ${{ secrets.AWIKI_E2E_APP_HANDLE }}
          CLI_HANDLE: ${{ secrets.AWIKI_E2E_CLI_HANDLE }}
        run: |
          [[ "$CLI_REF" =~ ^[0-9a-fA-F]{40}$ ]]
          test -n "$E2E_PHONE" && test -n "$E2E_OTP"
          test -n "$APP_HANDLE" && test -n "$CLI_HANDLE"

      - uses: actions/checkout@v6
        with:
          path: test-awiki-me

      - uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/awiki-cli-rs2
          ref: ${{ github.event.inputs.cli_ref || vars.AWIKI_CLI_RS2_REF }}
          token: ${{ secrets.AWIKI_CI_READ_TOKEN || github.token }}
          path: awiki-cli-rs2

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - uses: dtolnay/rust-toolchain@1.88.0

      - name: Install Linux desktop dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev \
            libsecret-1-dev libsqlite3-dev xvfb dbus-x11
          flutter config --enable-linux-desktop

      - name: Prepare SQLite source
        run: |
          curl --fail --location --connect-timeout 20 --max-time 180 \
            --output /tmp/sqlite.tar.gz \
            https://sqlite.org/2026/sqlite-autoconf-3520000.tar.gz
          mkdir -p /tmp/awiki-sqlite3
          tar -xzf /tmp/sqlite.tar.gz --strip-components=1 -C /tmp/awiki-sqlite3

      - name: Build audited debug artifacts
        working-directory: awiki-cli-rs2
        run: |
          cargo build -p im-core-dart -p awiki-cli --locked
          mkdir -p packages/awiki_im_core/linux/lib
          cp target/debug/libawiki_im_core.so \
            packages/awiki_im_core/linux/lib/libawiki_im_core.so

      - name: Install Flutter dependencies
        working-directory: test-awiki-me
        run: flutter pub get

      - name: Write secret-backed awiki.info config
        working-directory: test-awiki-me
        env:
          CLI_REF: ${{ github.event.inputs.cli_ref || vars.AWIKI_CLI_RS2_REF }}
          E2E_PHONE: ${{ secrets.AWIKI_E2E_OTP_PHONE }}
          E2E_OTP: ${{ secrets.AWIKI_E2E_OTP_CODE }}
          APP_HANDLE: ${{ secrets.AWIKI_E2E_APP_HANDLE }}
          CLI_HANDLE: ${{ secrets.AWIKI_E2E_CLI_HANDLE }}
        run: |
          mkdir -p .e2e/ci
          python3 - <<'PY'
          import json, os
          config = {
              "platform": "linux",
              "service": {
                  "baseUrl": "https://awiki.info",
                  "userServiceUrl": "https://awiki.info",
                  "messageServiceUrl": "https://awiki.info",
                  "messageServiceWsUrl": "wss://awiki.info/im/ws",
                  "didDomain": "awiki.info",
                  "anpServiceUrl": "https://awiki.info/anp-im/rpc",
                  "anpServiceDid": "did:wba:awiki.info",
              },
              "otp": {"phone": os.environ["E2E_PHONE"], "code": os.environ["E2E_OTP"]},
              "accounts": {
                  "appUser": {"handle": os.environ["APP_HANDLE"]},
                  "cliPeer": {"handle": os.environ["CLI_HANDLE"]},
              },
              "cliPeer": {
                  "binary": "../awiki-cli-rs2/target/debug/awiki-cli",
                  "sourceRef": os.environ["CLI_REF"],
              },
          }
          with open(".e2e/ci/remote.json", "w", encoding="utf-8") as handle:
              json.dump(config, handle)
          PY

      - name: Run real App to CLI product gate against awiki.info
        working-directory: test-awiki-me
        env:
          AWIKI_SQLITE3_SOURCE_DIR: /tmp/awiki-sqlite3
        run: |
          test "$(git -C ../awiki-cli-rs2 rev-parse HEAD)" = \
            "${{ github.event.inputs.cli_ref || vars.AWIKI_CLI_RS2_REF }}"
          dart run tests/e2e/runner.dart \
            --case "${{ github.event.inputs.e2e_case || 'full' }}" \
            --config .e2e/ci/remote.json \
            --run-id gha-remote-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload real product reports and residual ledger
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: awiki-me-remote-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-awiki-me/.e2e/
          if-no-files-found: error
          retention-days: 30

  windows-pr:
    name: Windows x64 build and native smoke
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-2022
    timeout-minutes: 75
    env:
      WINDOWS_CORE_REF: ${{ github.event.inputs.cli_ref || vars.AWIKI_CLI_RS2_WINDOWS_REF || vars.AWIKI_CLI_RS2_REF }}
      WINDOWS_ANP_REF: 67e6680fac80a5fb3dca41029c67a0ea3ecc0dd5
    steps:
      - name: Require read-only private Core token
        shell: bash
        env:
          READ_TOKEN: ${{ secrets.AWIKI_CI_READ_TOKEN }}
        run: |
          [[ "$WINDOWS_CORE_REF" =~ ^[0-9a-f]{40}$ ]] || {
            echo "AWIKI_CLI_RS2_WINDOWS_REF must be an exact Core commit SHA" >&2
            exit 1
          }
          test -n "$READ_TOKEN" || {
            echo "AWIKI_CI_READ_TOKEN is required for the private Core checkout" >&2
            exit 1
          }

      - name: Checkout AWiki Me
        uses: actions/checkout@v6
        with:
          path: test-awiki-me

      - name: Checkout pinned CLI / IM Core
        uses: actions/checkout@v6
        with:
          repository: AgentConnect/awiki-cli-rs2
          ref: ${{ env.WINDOWS_CORE_REF }}
          token: ${{ secrets.AWIKI_CI_READ_TOKEN }}
          path: awiki-cli-rs2

      - name: Verify exact CLI / IM Core checkout
        shell: pwsh
        run: |
          $actual = (git -C awiki-cli-rs2 rev-parse HEAD).Trim().ToLowerInvariant()
          if ($actual -ne $env:WINDOWS_CORE_REF) {
            throw "Core checkout is $actual, expected $env:WINDOWS_CORE_REF"
          }

      - name: Checkout pinned ANP
        uses: actions/checkout@v6
        with:
          repository: agent-network-protocol/anp
          ref: ${{ env.WINDOWS_ANP_REF }}
          path: anp/anp

      - name: Setup Flutter 3.44.0
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Setup Rust 1.88.0
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: x86_64-pc-windows-msvc

      - name: Enable Windows desktop
        shell: pwsh
        run: flutter config --enable-windows-desktop

      - name: Run IM Core Rust host tests
        working-directory: awiki-cli-rs2
        shell: pwsh
        run: |
          cargo +1.88.0 test `
            -p im-core-dart `
            --locked `
            --no-default-features `
            --features blocking,sqlite,http,windows

      - name: Build and verify x64 native IM Core
        working-directory: awiki-cli-rs2
        shell: pwsh
        run: ./scripts/flutter/build-windows.ps1

      - name: Run IM Core Flutter loader tests
        working-directory: awiki-cli-rs2/packages/awiki_im_core
        shell: pwsh
        run: |
          flutter pub get
          flutter test --no-pub test/native_library_loader_test.dart

      - name: Install AWiki Me dependencies
        working-directory: test-awiki-me
        shell: pwsh
        run: flutter pub get

      - name: Run Windows runner and package contract tests
        working-directory: test-awiki-me
        shell: pwsh
        run: |
          flutter test --no-pub tests/unit/windows_runner_configuration_test.dart
          flutter test --no-pub tests/unit/windows_installer_configuration_test.dart
          flutter test --no-pub tests/unit/package_manifest_test.dart
          flutter test --no-pub tests/unit/windows_scope_secret_integration_configuration_test.dart

      - name: Build Windows Debug
        working-directory: test-awiki-me
        shell: pwsh
        run: |
          flutter build windows `
            --debug `
            --no-pub `
            --dart-define=AWIKI_PRIMARY_TENANT_DOMAIN=awiki.ai `
            --dart-define=AWIKI_APP_SOURCE_REF=${{ github.sha }} `
            --dart-define=AWIKI_IM_CORE_SOURCE_REF=${{ env.WINDOWS_CORE_REF }}

      - name: Build Windows Release
        working-directory: test-awiki-me
        shell: pwsh
        run: |
          flutter build windows `
            --release `
            --no-pub `
            --dart-define=AWIKI_PRIMARY_TENANT_DOMAIN=awiki.ai `
            --dart-define=AWIKI_APP_SOURCE_REF=${{ github.sha }} `
            --dart-define=AWIKI_IM_CORE_SOURCE_REF=${{ env.WINDOWS_CORE_REF }}

      - name: Real IM Core SQLite and identity Vault initialization
        working-directory: test-awiki-me
        shell: pwsh
        run: |
          flutter test `
            --no-pub `
            --dart-define=AWIKI_E2E=true `
            integration_test/im_core_open_smoke_test.dart `
            -d windows

      - name: Run app, single-instance, shutdown, and Credential smoke
        working-directory: test-awiki-me
        shell: pwsh
        run: |
          ./scripts/windows/run_pr_smoke.ps1 `
            -ReleaseDir build/windows/x64/runner/Release

      - name: Build production scope-secret MethodChannel probe
        working-directory: test-awiki-me
        shell: pwsh
        run: |
          flutter build windows `
            --release `
            --no-pub `
            --target tests/e2e/flutter/native/production_scope_restart_probe.dart `
            --dart-define=AWIKI_APP_SOURCE_REF=${{ github.sha }} `
            --dart-define=AWIKI_IM_CORE_SOURCE_REF=${{ env.WINDOWS_CORE_REF }}

      - name: Verify production Credential Manager lifecycle
        working-directory: test-awiki-me
        shell: pwsh
        run: |
          ./scripts/windows/run_scope_secret_integration.ps1 `
            -ReleaseDir build/windows/x64/runner/Release
