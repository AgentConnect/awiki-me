name: awiki_me
description: AWiki Me Flutter messaging client
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  archive: ^3.6.1
  intl: ^0.19.0
  http: ^1.2.2
  path_provider: ^2.1.5
  web_socket_channel: ^3.0.1
  flutter_secure_storage: ^9.2.4
  sqflite: ^2.4.1
  flutter_markdown: ^0.7.3+2
  flutter_svg: ^2.0.10+1
  flutter_riverpod: ^2.6.1
  sqlite3_flutter_libs: ^0.5.42
  url_launcher: ^6.3.1
  pointycastle: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/branding/awiki-me-logo.png
    - assets/icons/
