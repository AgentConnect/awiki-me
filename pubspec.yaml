name: awiki_me
description: AWiki Me Flutter messaging client
publish_to: "none"

version: 0.1.1+4

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  awiki_im_core:
    path: ../awiki-cli-rs2/packages/awiki_im_core
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  auto_updater: ^1.0.0
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8
  intl: ">=0.19.0 <0.21.0"
  http: ^1.2.2
  package_info_plus: ^9.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4
  sqflite: ^2.4.1
  flutter_markdown: ^0.7.3+2
  markdown: ^7.3.0
  flutter_svg: ^2.0.10+1
  flutter_local_notifications: ^19.4.0
  flutter_riverpod: ^2.6.1
  sqlite3_flutter_libs: ^0.5.42
  url_launcher: ^6.3.1
  sqflite_common_ffi: 2.4.0
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4
  yaml: ^3.1.3

hooks:
  user_defines:
    sqlite3:
      source: system

flutter:
  config:
    enable-swift-package-manager: false
  generate: true
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/icons/
