# Copy this file to e2e.local.yaml and fill in local-only OTP values.

platform: macos

service:
  baseUrl: https://anpclaw.com
  userServiceUrl: https://anpclaw.com
  messageServiceUrl: https://anpclaw.com
  messageServiceWsUrl: wss://anpclaw.com/im/ws
  didDomain: anpclaw.com
  anpServiceUrl: https://anpclaw.com/anp-im/rpc
  anpServiceDid: did:wba:anpclaw.com

otp:
  phone: "+8610000000000"
  code: "000000"

accounts:
  appUser:
    handle: awiki-e2e-app
  cliPeer:
    handle: awiki-e2e-cli

cliPeer:
  binary: ../awiki-cli-rs2/target/release/awiki-cli

daemon:
  rustRepo: ../awiki-cli-rs2

messageAgent:
  enabled: true
  runtimeProvider: hermes
  processingScope: all_conversations
