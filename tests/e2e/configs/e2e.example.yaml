# Copy this file to e2e.local.yaml and fill in local-only OTP values.

platform: macos

service:
  baseUrl: https://anpclaw.com
  userServiceUrl: https://anpclaw.com
  messageServiceUrl: https://anpclaw.com
  messageServiceWsUrl: wss://anpclaw.com/im/ws
  didDomain: anpclaw.com
  anpServiceUrl: https://anpclaw.com/anp-im/rpc
  anpServiceDid: did:wba:anpclaw.com

otp:
  phone: "+8610000000000"
  code: "000000"

accounts:
  appUser:
    handle: awiki-e2e-app
  cliPeer:
    handle: awiki-e2e-cli

cliPeer:
  binary: ../awiki-cli-rs2/target/release/awiki-cli

daemon:
  rustRepo: ../awiki-cli-rs2
  # Optional local-only env file loaded into the temporary E2E daemon process.
  # Do not commit real tokens. Example content:
  #   ANTHROPIC_BASE_URL=http://127.0.0.1:4000
  #   ANTHROPIC_AUTH_TOKEN=...
  #   CLAUDE_CODEX_MODEL=gpt-5.4-mini
  #   AWIKI_DAEMON_CLI_ENV_PASSTHROUGH=ANTHROPIC_*,CLAUDE_CODEX_MODEL
  # envFile: .e2e/agent-cli.env

messageAgent:
  enabled: true
  runtimeProvider: hermes
  processingScope: all_conversations

codexAgent:
  enabled: false
  realBackend: true

claudeCodeAgent:
  enabled: false
  realBackend: true
