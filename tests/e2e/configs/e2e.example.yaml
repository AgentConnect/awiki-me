# Copy this file to an ignored *.local.yaml and fill in remote awiki.info
# account-pool values. The config is local secret storage; the services are not.

platform: macos

service:
  baseUrl: https://awiki.info
  userServiceUrl: https://awiki.info
  messageServiceUrl: https://awiki.info
  messageServiceWsUrl: wss://awiki.info/im/ws
  didDomain: awiki.info
  anpServiceUrl: https://awiki.info/anp-im/rpc
  anpServiceDid: did:wba:awiki.info

otp:
  phone: "+8610000000000"
  code: "000000"

accounts:
  appUser:
    handle: awiki-e2e-app
  cliPeer:
    handle: awiki-e2e-cli

# For --case display-name-fallback, use a separate ignored *.local.yaml whose
# cliPeer is a dedicated awiki.info actor with no nickname and one stable full
# Handle. The runner deliberately does not update that peer's Profile.

cliPeer:
  binary: ../awiki-cli-rs2/target/debug/awiki-cli
  # Replace with the exact non-zero 40-character commit used to build both
  # awiki-cli and the sibling awiki_im_core SDK artifacts.
  sourceRef: "0000000000000000000000000000000000000000"

performance:
  dataset:
    conversationCount: 100
    longThreadMessageCount: 100
  budgets:
    maxFullRefreshDuringSendReceive: 0
    # Hard budgets fail --case performance. Keep these conservative for local
    # real-backend variance; tighten in CI after collecting stable baselines.
    hardBudgetMs:
      app.launch_to_shell_visible_ms: 30000
      conversation_list.first_non_empty_visible_ms: 10000
      conversation_list.snapshot_load_ms: 5000
      conversation_list.fast_local_hydrate_ms: 5000
      conversation_list.fast_local_page_scan_ms: 30000
      conversation_list.full_hydrate_ms: 15000
      conversation_list.full_page_scan_ms: 60000
      message.app_send_to_cli_inbox_visible_ms: 90000
      message.app_send_to_cli_history_visible_ms: 90000
      message.cli_send_app_thread_after_ms: 90000
      message.cli_send_to_app_open_first_paint_ms: 90000
      message.cli_send_to_app_history_visible_ms: 90000
      message.cli_send_to_conversation_preview_visible_ms: 90000
      thread.realtime_open_first_paint_ms: 5000
      thread.open_to_first_message_visible_ms: 8000
      thread.history_initial_load_ms: 8000
    # Soft budgets are reported as warnings in timings.json.
    softBudgetMs:
      app.launch_to_shell_visible_ms: 15000
      conversation_list.first_non_empty_visible_ms: 3000
      conversation_list.snapshot_load_ms: 1000
      conversation_list.fast_local_hydrate_ms: 1500
      conversation_list.fast_local_page_scan_ms: 15000
      conversation_list.full_hydrate_ms: 5000
      conversation_list.full_page_scan_ms: 30000
      message.app_send_to_cli_inbox_visible_ms: 20000
      message.app_send_to_cli_history_visible_ms: 20000
      message.cli_send_app_thread_after_ms: 20000
      message.cli_send_to_app_open_first_paint_ms: 5000
      message.cli_send_to_app_history_visible_ms: 20000
      message.cli_send_to_conversation_preview_visible_ms: 20000
      thread.realtime_open_first_paint_ms: 1500
      thread.open_to_first_message_visible_ms: 3000
      thread.history_initial_load_ms: 3000

daemon:
  rustRepo: ../awiki-cli-rs2
  # Required when running:
  #   dart run tests/e2e/runner.dart --case message-agent
  # Build the binary first with:
  #   cd ../awiki-cli-rs2 && cargo build -p awiki-deamon --locked --bin awiki-deamon
  # binary: ../awiki-cli-rs2/target/debug/awiki-deamon
  # stateRoot: .e2e/message-agent-daemon-state
  # readyFile: .e2e/message-agent-daemon-ready.json
  # fakeHermesGatewayCommand: python3 path/to/fake_full_ui_hermes_gateway.py
  # Optional local-only env file loaded into the temporary E2E daemon process.
  # Do not commit real tokens. Example content:
  #   ANTHROPIC_BASE_URL=http://127.0.0.1:4000
  #   ANTHROPIC_AUTH_TOKEN=...
  #   CLAUDE_CODEX_MODEL=gpt-5.4-mini
  #   AWIKI_DAEMON_CLI_ENV_PASSTHROUGH=ANTHROPIC_*,CLAUDE_CODEX_MODEL
  # envFile: .e2e/agent-cli.env

messageAgent:
  enabled: true
  runtimeProvider: hermes
  processingScope: all_conversations
  # --case message-agent is now a product-level gate and must use the real
  # daemon/backend path instead of silently returning from a skipped UI test.
  realBackend: true

codexAgent:
  enabled: false
  realBackend: true

claudeCodeAgent:
  enabled: false
  realBackend: true
