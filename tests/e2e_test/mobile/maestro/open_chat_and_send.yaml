appId: ${APP_ID}
---
- launchApp
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "允许"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    id: e2e-chat-back-button
    optional: true
- extendedWaitUntil:
    visible:
      id: e2e-quick-actions-button
    timeout: 90000
- tapOn:
    id: e2e-quick-actions-button
- tapOn:
    id: e2e-start-conversation-menu-item
- extendedWaitUntil:
    visible:
      id: e2e-identity-lookup-input
    timeout: 30000
- tapOn:
    id: e2e-identity-lookup-input
- eraseText
- inputText: ${PEER_HANDLE}
- hideKeyboard
- tapOn:
    id: e2e-identity-lookup-search-button
- extendedWaitUntil:
    visible:
      id: e2e-identity-start-chat-button
    timeout: 60000
- tapOn:
    id: e2e-identity-start-chat-button
- extendedWaitUntil:
    visible:
      id: e2e-chat-input
    timeout: 60000
- tapOn:
    id: e2e-chat-input
- eraseText
- inputText: ${MESSAGE_TEXT}
- hideKeyboard
- tapOn:
    id: e2e-chat-send-button
- extendedWaitUntil:
    visible:
      id: ${MESSAGE_ID}
    timeout: 60000
