# Copy this file to tests/e2e_test/configs/mobile.local.yaml for real E2E runs.
# Do not commit tests/e2e_test/configs/mobile.local.yaml, .e2e/reports, real test-account state,
# tokens, signing material, or device-specific output.

platform: ios # ios | android

app:
  androidId: ai.awiki.awikime
  iosId: ai.awiki.awikime123

service:
  baseUrl: https://awiki.info
  userServiceUrl: https://awiki.info
  messageServiceUrl: https://awiki.info
  didDomain: awiki.info

device:
  # resetBeforeRun clears simulator/device app data before installation.
  # Keep it enabled for clean release/nightly smoke runs. Disable it only when
  # intentionally reusing local login state while debugging a failed run.
  resetBeforeRun: true
  ios:
    # Use two independent iOS simulators. They may be created by name below or
    # referenced by fixed UDID in tests/e2e_test/configs/mobile.local.yaml.
    # Optional. If omitted, the runner picks the latest installed iPhone
    # simulator type and Xcode's default available iOS runtime.
    # deviceType: "iPhone 16 Pro"
    # runtime: "iOS 18.5"
    names:
      a: awiki-e2e-ios-a
      b: awiki-e2e-ios-b
    # Optional: use already-created simulator UDIDs instead of names.
    # ids:
    #   a: 00000000-0000-0000-0000-000000000001
    #   b: 00000000-0000-0000-0000-000000000002
  android:
    # Use two independent AVDs with the same model/system image. Do not use
    # one AVD's read-only multi-instance mode for this test, because this flow
    # intentionally writes real local login state.
    avdNames:
      a: awiki_e2e_android_a
      b: awiki_e2e_android_b
    # Optional: use already-running emulator/device serials instead.
    # ids:
    #   a: emulator-5554
    #   b: emulator-5556

otp:
  digits: 6
  timeoutSeconds: 180

accounts:
  # Replace these placeholders in tests/e2e_test/configs/mobile.local.yaml with two isolated
  # non-production accounts. The accounts must have different handles and must
  # be safe to reset/re-register during a real E2E run.
  a:
    phone: "+8610011110001"
    handle: awiki-e2e-a
  b:
    phone: "+8610011110002"
    handle: awiki-e2e-b

message:
  waitTimeoutSeconds: 90
