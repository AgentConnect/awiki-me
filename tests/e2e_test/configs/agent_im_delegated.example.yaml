# Example config for Agent IM delegated-message desktop E2E.
# Copy to agent_im_delegated.local.yaml for local runs; never commit local files.

service:
  baseUrl: https://awiki.info
  userServiceUrl: https://awiki.info
  messageServiceUrl: https://awiki.info
  messageServiceWsUrl: wss://awiki.info/im/ws
  didDomain: awiki.info

remote:
  sshAlias: ali
  collectLogs: true
  redactSecrets: true

cliPeer:
  repo: ../awiki-cli-rs2
  binary: target/debug/awiki-cli
  workspaceRoot: .e2e/agent-im/cli-peer

app:
  platform: macos
  runMode: integration_test
  workspaceRoot: .e2e/agent-im/app
  appInstanceId: macos-e2e-app

agent:
  expectedRuntime: hermes
  delegatedKeyFragment: daemon-key-1
  # Optional. If omitted, the App probe selects the first active daemon from
  # User Service agent inventory for the App user's controller DID.
  daemonDid: ""

accounts:
  appUser:
    phoneEnv: DEV_OTP_PHONE
    otpEnv: DEV_OTP_CODE
    handle: e2e-agent-app
  peerUser:
    phoneEnv: AWIKI_E2E_PEER_PHONE
    otpEnv: AWIKI_E2E_PEER_OTP
    handle: e2e-agent-peer

timeouts:
  bootstrapSeconds: 60
  daemonConnectSeconds: 90
  messageProcessSeconds: 120
