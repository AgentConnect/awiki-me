appId: ${APP_ID}
---
- launchApp
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "允许"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- extendedWaitUntil:
    visible:
      id: e2e-phone-input
    timeout: 60000
- tapOn:
    id: e2e-phone-input
- eraseText
- inputText: ${PHONE}
- tapOn:
    id: e2e-send-otp-button
- extendedWaitUntil:
    visible:
      id: e2e-otp-sent
    timeout: ${OTP_SEND_TIMEOUT_MS}
- tapOn:
    id: e2e-otp-input
- extendedWaitUntil:
    visible:
      id: e2e-otp-complete
    timeout: ${OTP_TIMEOUT_MS}
- hideKeyboard
- scrollUntilVisible:
    element:
      id: e2e-login-next-button
    direction: DOWN
    timeout: 60000
    visibilityPercentage: 50
- tapOn:
    id: e2e-login-next-button
- extendedWaitUntil:
    visible:
      id: e2e-handle-input
    timeout: 60000
- tapOn:
    id: e2e-handle-input
- eraseText
- inputText: ${HANDLE}
- hideKeyboard
- scrollUntilVisible:
    element:
      id: e2e-complete-login-button
    direction: DOWN
    timeout: 60000
    visibilityPercentage: 50
- tapOn:
    id: e2e-complete-login-button
- extendedWaitUntil:
    visible:
      id: e2e-quick-actions-button
    timeout: 90000
